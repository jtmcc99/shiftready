services:
  - type: web
    name: shiftready-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
    # Backend writes briefing history to /briefings on local disk.
    # Render free tier uses an ephemeral filesystem, so briefing history resets on redeploy.
