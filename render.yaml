# Service root is `backend/` — build/start commands run from there (see Render monorepo docs).
# If you configure the service manually in the Dashboard instead, set Root Directory to
# `backend` and use the SAME commands (do not add `cd backend` or `backend/` prefixes).
services:
  - type: web
    name: shiftready-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
    # Backend writes briefing history to /briefings on local disk.
    # Render free tier uses an ephemeral filesystem, so briefing history resets on redeploy.
